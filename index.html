<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZYRVIS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #ffffff;
            color: #000000;
            overflow: hidden;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        #animation-canvas {
            width: 420px;
            height: 320px;
        }
        .text {
            font-size: 24px;
            color: #000000;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 1s ease-out, transform 1s ease-out;
            margin-top: 20px;
        }
        .text.visible {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="container">
        <svg id="animation-canvas" viewBox="0 0 420 320" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Phase 1: Hi drawing -->
            <g id="hi-group">
                <path id="hi-path" d=""
                      stroke="#000" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            </g>
            <!-- Phase 2: Snake logo -->
            <g id="logo-group" opacity="0">
                <!-- Snake head outline -->
                <path id="snake-outline" d=""
                      stroke="#000" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                <!-- Left eye outline -->
                <path id="left-eye-outline" d=""
                      stroke="#000" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                <!-- Right eye outline -->
                <path id="right-eye-outline" d=""
                      stroke="#000" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                <!-- Tongue -->
                <path id="tongue" d=""
                      stroke="#000" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                <!-- Left pupil (white base + black pupil) -->
                <g id="left-eye-group">
                    <ellipse cx="160" cy="155" rx="16" ry="12" fill="white"/>
                    <ellipse id="left-pupil" cx="162" cy="155" rx="6" ry="8" fill="#000"/>
                </g>
                <!-- Right eye group -->
                <g id="right-eye-group">
                    <ellipse cx="260" cy="155" rx="16" ry="12" fill="white"/>
                    <ellipse id="right-pupil" cx="262" cy="155" rx="6" ry="8" fill="#000"/>
                </g>
            </g>
        </svg>
        <div class="text" id="greeting">你好，我是 ZYRVIS</div>
    </div>

    <script>
    (function() {
        // ============ PATH DATA ============
        // Artistic cursive "Hi" - single continuous stroke
        const hiPath =
            // H - left vertical
            "M 100,200 L 100,100 " +
            // H - down to middle, crossbar, continue to right vertical
            "M 100,150 C 110,148 130,148 140,150 " +
            // H - right vertical
            "L 140,100 L 140,200 " +
            // Connector H -> i with elegant curve
            "C 145,210 155,85 170,95 " +
            // i - dot (loop)
            "C 172,80 182,80 180,95 " +
            // i - body
            "L 175,200 " +
            // Tail flourish that will morph into snake
            "C 180,215 195,220 210,210";

        // Actually, let me design a much better single-stroke cursive "Hi"
        // that flows elegantly and can transition to the snake

        const hiPathData =
            // Start bottom-left of H
            "M 80,210 " +
            // H left stroke going up
            "C 78,180 76,140 80,105 " +
            // Small curve at top of H
            "C 82,95 85,95 86,105 " +
            // Come back down to middle
            "C 88,130 88,140 86,150 " +
            // H crossbar - elegant curve to right
            "C 95,142 115,138 130,142 " +
            // H right stroke going up
            "C 134,130 136,115 134,105 " +
            // Curve at top
            "C 132,95 129,95 128,105 " +
            // Right stroke going down
            "C 126,140 128,180 132,210 " +
            // Elegant connecting swoop to 'i'
            "C 136,230 155,230 165,210 " +
            // i body going up
            "C 172,185 174,160 170,140 " +
            // Small curve and come back
            "C 168,130 165,128 164,135 " +
            // i body going down
            "C 162,160 160,190 165,215 " +
            // Flourish tail
            "C 170,235 185,240 210,225";

        // Snake head outline - extracted/designed from the logo image
        // Wider, flatter oval shape like in the reference
        const snakeOutlinePath =
            // Start from left side
            "M 100,170 " +
            // Top of head - wide flat curve
            "C 100,105 160,75 210,75 " +
            "C 260,75 320,105 320,170 " +
            // Right side curves down
            "C 320,200 300,230 280,235 " +
            // Right lip dip
            "C 270,237 265,233 260,228 " +
            // Bottom right toward tongue
            "C 245,220 230,215 215,218 " +
            // Tongue fork right
            "C 218,228 225,250 232,265 " +
            // Back to tongue base
            "C 225,255 218,245 215,238 " +
            // Tongue center
            "C 212,232 210,230 208,232 " +
            // Tongue fork left
            "C 205,238 198,248 192,258 " +
            // Back from left fork
            "C 198,245 205,228 202,218 " +
            // Bottom left
            "C 190,215 175,220 160,228 " +
            // Left lip dip
            "C 155,233 150,237 140,235 " +
            // Left side back up
            "C 120,230 100,200 100,170 Z";

        // Left eye - angular, menacing
        const leftEyePath =
            "M 140,155 " +
            "C 143,140 155,132 170,138 " +
            "C 178,142 180,155 175,165 " +
            "C 170,172 155,175 145,168 " +
            "C 139,163 138,160 140,155 Z";

        // Right eye - angular, menacing
        const rightEyePath =
            "M 245,138 " +
            "C 260,132 272,140 275,155 " +
            "C 277,160 276,163 270,168 " +
            "C 260,175 245,172 240,165 " +
            "C 235,155 237,142 245,138 Z";

        // Tongue (already part of outline, but separate for drawing)
        const tonguePath =
            "M 210,218 " +
            "C 212,228 218,245 225,260 " +
            "M 210,218 " +
            "C 208,228 202,245 195,260";

        // ============ ELEMENTS ============
        const hiPathEl = document.getElementById('hi-path');
        const hiGroup = document.getElementById('hi-group');
        const logoGroup = document.getElementById('logo-group');
        const snakeOutlineEl = document.getElementById('snake-outline');
        const leftEyeOutlineEl = document.getElementById('left-eye-outline');
        const rightEyeOutlineEl = document.getElementById('right-eye-outline');
        const tongueEl = document.getElementById('tongue');
        const leftPupil = document.getElementById('left-pupil');
        const rightPupil = document.getElementById('right-pupil');
        const leftEyeGroup = document.getElementById('left-eye-group');
        const rightEyeGroup = document.getElementById('right-eye-group');
        const greeting = document.getElementById('greeting');

        // ============ PHASE 1: Draw "Hi" ============
        function startHiAnimation() {
            hiPathEl.setAttribute('d', hiPathData);
            const length = hiPathEl.getTotalLength();

            hiPathEl.style.strokeDasharray = length;
            hiPathEl.style.strokeDashoffset = length;

            // Animate drawing
            const duration = 2000; // 2 seconds
            const startTime = performance.now();

            function animateHi(now) {
                const elapsed = now - startTime;
                const progress = Math.min(elapsed / duration, 1);
                // Smooth easing
                const eased = progress < 0.5
                    ? 2 * progress * progress
                    : 1 - Math.pow(-2 * progress + 2, 2) / 2;

                hiPathEl.style.strokeDashoffset = length * (1 - eased);

                if (progress < 1) {
                    requestAnimationFrame(animateHi);
                } else {
                    // Pause briefly, then morph to snake
                    setTimeout(startMorphAnimation, 400);
                }
            }
            requestAnimationFrame(animateHi);
        }

        // ============ PHASE 2: Morph Hi -> Snake ============
        function startMorphAnimation() {
            const morphDuration = 800;
            const startTime = performance.now();

            function animateMorph(now) {
                const elapsed = now - startTime;
                const progress = Math.min(elapsed / morphDuration, 1);
                // Smooth ease-in-out
                const eased = progress < 0.5
                    ? 4 * progress * progress * progress
                    : 1 - Math.pow(-2 * progress + 2, 3) / 2;

                // Fade out Hi
                hiGroup.style.opacity = 1 - eased;
                hiGroup.style.transform = `scale(${1 - 0.3 * eased}) translate(${50 * eased}px, ${-30 * eased}px)`;

                if (progress >= 0.3) {
                    const logoProgress = Math.min((progress - 0.3) / 0.7, 1);
                    logoGroup.style.opacity = logoProgress;
                }

                if (progress < 1) {
                    requestAnimationFrame(animateMorph);
                } else {
                    hiGroup.style.display = 'none';
                    startSnakeDrawing();
                }
            }
            requestAnimationFrame(animateMorph);
        }

        // ============ PHASE 3: Draw Snake Logo ============
        function startSnakeDrawing() {
            logoGroup.style.opacity = '1';
            leftEyeGroup.style.opacity = '0';
            rightEyeGroup.style.opacity = '0';

            // Set paths
            snakeOutlineEl.setAttribute('d', snakeOutlinePath);
            leftEyeOutlineEl.setAttribute('d', leftEyePath);
            rightEyeOutlineEl.setAttribute('d', rightEyePath);
            tongueEl.setAttribute('d', tonguePath);

            const paths = [snakeOutlineEl, leftEyeOutlineEl, rightEyeOutlineEl, tongueEl];
            const lengths = paths.map(p => p.getTotalLength());

            // Set up dash arrays
            paths.forEach((p, i) => {
                p.style.strokeDasharray = lengths[i];
                p.style.strokeDashoffset = lengths[i];
            });

            // Sequential drawing: outline -> eyes -> tongue
            const totalDuration = 2500;
            const timings = [
                { start: 0, end: 0.55 },      // outline
                { start: 0.5, end: 0.72 },     // left eye
                { start: 0.6, end: 0.82 },     // right eye
                { start: 0.78, end: 1.0 },     // tongue
            ];

            const startTime = performance.now();

            function animateSnake(now) {
                const elapsed = now - startTime;
                const progress = Math.min(elapsed / totalDuration, 1);

                paths.forEach((p, i) => {
                    const { start, end } = timings[i];
                    let localProgress = 0;
                    if (progress > start) {
                        localProgress = Math.min((progress - start) / (end - start), 1);
                    }
                    // Smooth easing per segment
                    const eased = localProgress < 0.5
                        ? 2 * localProgress * localProgress
                        : 1 - Math.pow(-2 * localProgress + 2, 2) / 2;
                    p.style.strokeDashoffset = lengths[i] * (1 - eased);
                });

                if (progress < 1) {
                    requestAnimationFrame(animateSnake);
                } else {
                    // Fill the outline and eyes
                    setTimeout(() => {
                        snakeOutlineEl.style.fill = 'none';
                        leftEyeOutlineEl.style.fill = '#000';
                        rightEyeOutlineEl.style.fill = '#000';

                        // Show eye whites and pupils
                        leftEyeGroup.style.opacity = '1';
                        rightEyeGroup.style.opacity = '1';
                        leftEyeGroup.style.transition = 'opacity 0.5s';
                        rightEyeGroup.style.transition = 'opacity 0.5s';

                        // Start eye animation
                        startEyeAnimation();

                        // Show greeting text
                        setTimeout(() => {
                            greeting.classList.add('visible');
                        }, 500);
                    }, 300);
                }
            }
            requestAnimationFrame(animateSnake);
        }

        // ============ PHASE 4: Eye Animation ============
        function startEyeAnimation() {
            // Eye centers and bounds
            const leftCenter = { cx: 157, cy: 155 };
            const rightCenter = { cx: 258, cy: 155 };
            const maxOffset = 5;

            let currentLeft = { x: 0, y: 0 };
            let currentRight = { x: 0, y: 0 };
            let targetLeft = { x: 0, y: 0 };
            let targetRight = { x: 0, y: 0 };

            function newTarget() {
                // Random direction - both eyes look the same way
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.random() * maxOffset;
                const dx = Math.cos(angle) * dist;
                const dy = Math.sin(angle) * dist * 0.6; // Less vertical movement

                targetLeft = { x: dx, y: dy };
                targetRight = { x: dx, y: dy };
            }

            function lerp(a, b, t) {
                return a + (b - a) * t;
            }

            let lastTargetTime = 0;
            const retargetInterval = 800 + Math.random() * 2000;
            let nextRetarget = retargetInterval;

            function animateEyes(now) {
                if (!lastTargetTime) lastTargetTime = now;
                const elapsed = now - lastTargetTime;

                if (elapsed > nextRetarget) {
                    newTarget();
                    lastTargetTime = now;
                    nextRetarget = 600 + Math.random() * 2500;
                }

                // Smooth interpolation
                const t = 0.08;
                currentLeft.x = lerp(currentLeft.x, targetLeft.x, t);
                currentLeft.y = lerp(currentLeft.y, targetLeft.y, t);
                currentRight.x = lerp(currentRight.x, targetRight.x, t);
                currentRight.y = lerp(currentRight.y, targetRight.y, t);

                leftPupil.setAttribute('cx', leftCenter.cx + currentLeft.x);
                leftPupil.setAttribute('cy', leftCenter.cy + currentLeft.y);
                rightPupil.setAttribute('cx', rightCenter.cx + currentRight.x);
                rightPupil.setAttribute('cy', rightCenter.cy + currentRight.y);

                requestAnimationFrame(animateEyes);
            }

            newTarget();
            requestAnimationFrame(animateEyes);
        }

        // ============ START ============
        // Small delay before starting
        setTimeout(startHiAnimation, 300);
    })();
    </script>
</body>
</html>
