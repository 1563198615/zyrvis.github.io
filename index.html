<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZYRVIS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(ellipse at 50% 40%, #fafafa 0%, #ebebeb 100%);
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', 'Microsoft YaHei', sans-serif;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            opacity: 0.025;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 200px;
        }

        /* ── 左上角产品入口 ── */
        .product-launcher {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
        }
        .launcher-toggle {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px 8px 12px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px) saturate(1.6);
            -webkit-backdrop-filter: blur(20px) saturate(1.6);
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 999px;
            font-size: 13px;
            font-weight: 700;
            color: #1f2937;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
            transition: all 0.2s ease;
            user-select: none;
        }
        .launcher-toggle:hover {
            background: rgba(255, 255, 255, 0.95);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
        }
        .launcher-toggle .grid-icon {
            display: inline-grid;
            grid-template-columns: repeat(2, 4px);
            grid-template-rows: repeat(2, 4px);
            gap: 2px;
        }
        .launcher-toggle .grid-icon span {
            width: 4px;
            height: 4px;
            background: #1f2937;
            border-radius: 1px;
        }
        .launcher-toggle .arrow {
            font-size: 9px;
            opacity: 0.5;
            transition: transform 0.2s;
        }
        .launcher-toggle.open .arrow { transform: rotate(180deg); }

        .launcher-menu {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            width: 280px;
            padding: 8px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(24px) saturate(1.6);
            -webkit-backdrop-filter: blur(24px) saturate(1.6);
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 18px;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.12);
            display: none;
            flex-direction: column;
            gap: 2px;
            max-height: calc(100vh - 80px);
            overflow-y: auto;
        }
        .launcher-menu.open { display: flex; }

        .launcher-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 12px;
            text-decoration: none;
            color: #1f2937;
            transition: background 0.15s;
        }
        .launcher-item:hover { background: rgba(0, 0, 0, 0.04); }
        .launcher-item .emoji { font-size: 22px; line-height: 1; }
        .launcher-item .info { flex: 1; min-width: 0; }
        .launcher-item .name {
            font-size: 13.5px;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 2px;
        }
        .launcher-item .desc {
            font-size: 11px;
            color: #6b7280;
            line-height: 1.3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .launcher-item .arrow-right {
            font-size: 12px;
            color: #9ca3af;
            flex-shrink: 0;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stage {
            position: relative;
            width: 340px;
            height: 220px;
        }

        .stage svg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        #svg-hi {
            width: 210px;
            opacity: 0;
        }

        #svg-logo {
            width: 300px;
            opacity: 0;
        }

        .typing-wrap {
            margin-top: 36px;
            min-height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
        }

        #typed {
            font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', 'Microsoft YaHei', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: #111;
            letter-spacing: 3px;
        }

        .cursor {
            display: inline-block;
            width: 2.5px;
            height: 24px;
            background: #111;
            margin-left: 2px;
            vertical-align: text-bottom;
            opacity: 0;
        }
        .cursor.on { animation: blink .7s step-end infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

        @media (max-width: 600px) {
            .product-launcher { top: 12px; left: 12px; }
            .launcher-menu { width: 240px; }
        }
    </style>
</head>

<script>
// ── 蛇 logo 动画(原版照搬) ──
(function () {
    var svgHi   = document.getElementById('svg-hi');
    var svgLogo = document.getElementById('svg-logo');
    var hiH     = document.getElementById('hi-h');
    var hiI     = document.getElementById('hi-i');
    var lHead   = document.getElementById('l-head');
    var lEyeL   = document.getElementById('l-eyeL');
    var lEyeR   = document.getElementById('l-eyeR');
    var lHlL    = document.getElementById('l-hlL');
    var lHlR    = document.getElementById('l-hlR');
    var lJaw    = document.getElementById('l-jaw');
    var typed   = document.getElementById('typed');
    var cursor  = document.getElementById('cursor');
    var typingWrap = document.querySelector('.typing-wrap');

    function wait(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }
    function initDash(el) {
        var len = el.getTotalLength();
        el.style.strokeDasharray  = len;
        el.style.strokeDashoffset = len;
    }
    initDash(hiH); initDash(hiI); initDash(lHead); initDash(lEyeL); initDash(lEyeR); initDash(lJaw);

    function drawPath(el, dur, delay) {
        return new Promise(function(resolve) {
            setTimeout(function() {
                var len = parseFloat(el.style.strokeDasharray);
                var t0  = null;
                requestAnimationFrame(function tick(now) {
                    if (!t0) t0 = now;
                    var t = Math.min((now - t0) / dur, 1);
                    var e = 1 - Math.pow(1 - t, 3);
                    el.style.strokeDashoffset = (len * (1 - e)).toFixed(2);
                    if (t < 1) requestAnimationFrame(tick);
                    else { el.style.strokeDashoffset = '0'; resolve(); }
                });
            }, delay || 0);
        });
    }
    function fillIn(el, color, dur) {
        var d = dur || 500, c = color || '#111';
        el.style.fill = 'rgba(0,0,0,0)';
        el.getBoundingClientRect();
        el.style.transition = 'fill ' + d + 'ms ease';
        el.style.fill = c;
    }
    function fadeIn(el, dur) { el.style.transition = 'opacity ' + (dur || 300) + 'ms ease'; el.style.opacity = '1'; }

    async function phaseHi() {
        svgHi.style.opacity = '1';
        hiH.style.strokeWidth = '2.5';
        await Promise.all([drawPath(hiH, 1500, 0), drawPath(hiI, 1500, 0)]);
        fillIn(hiH, '#111', 500);
        await wait(1200);
    }
    async function phaseLogo() {
        svgHi.style.transition = 'opacity 0.55s ease';
        svgHi.style.opacity = '0';
        await wait(650);
        svgHi.style.display = 'none';
        svgLogo.style.opacity = '1';
        await Promise.all([
            drawPath(lHead, 2200, 0),
            drawPath(lJaw,  1800, 600),
            drawPath(lEyeL, 800,  1600),
            drawPath(lEyeR, 800,  1800)
        ]);
        fillIn(lHead, '#111', 600);
        fillIn(lEyeL, '#111', 600);
        fillIn(lEyeR, '#111', 600);
        fillIn(lJaw,  '#111', 600);
        await wait(650);
        [lHead, lEyeL, lEyeR, lJaw].forEach(function(el) {
            el.style.transition = 'stroke-width 0.35s ease';
            el.style.strokeWidth = '0';
        });
        await wait(400);
        fadeIn(lHlL, 500);
        fadeIn(lHlR, 500);
        await wait(600);
    }
    async function phaseType() {
        var text = '你好，我是ZYRVIS';
        typingWrap.style.transition = 'opacity 0.4s ease';
        typingWrap.style.opacity = '1';
        await wait(350);
        cursor.classList.add('on');
        for (var i = 0; i < text.length; i++) {
            typed.textContent += text[i];
            var ch = text[i];
            await wait(ch === '，' ? 280 : /[A-Z]/.test(ch) ? 85 : 130);
        }
        cursor.classList.remove('on');
        cursor.style.opacity = '1';
    }

    (async function() {
        await wait(500);
        await phaseHi();
        await phaseLogo();
        await phaseType();
    })();
})();

// ── 左上角产品入口 交互 ──
(function() {
    var toggle = document.getElementById('launcherToggle');
    var menu   = document.getElementById('launcherMenu');
    toggle.addEventListener('click', function(e) {
        e.stopPropagation();
        var open = menu.classList.toggle('open');
        toggle.classList.toggle('open', open);
    });
    document.addEventListener('click', function(e) {
        if (!menu.contains(e.target) && e.target !== toggle) {
            menu.classList.remove('open');
            toggle.classList.remove('open');
        }
    });
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            menu.classList.remove('open');
            toggle.classList.remove('open');
        }
    });
})();
</script>
