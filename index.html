<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZYRVIS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #fff;
        }
        .wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        .logo {
            width: min(70vw, 280px);
            height: auto;
            display: block;
        }
        .greeting {
            margin-top: 32px;
            font-size: 20px;
            font-weight: 400;
            color: #000;
            letter-spacing: 2px;
            font-family: -apple-system, 'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
    </style>
</head>
<body>
<div class="wrap">
    <img src="zyrvis.PNG" alt="ZYRVIS" class="logo">
    <p class="greeting">你好，我是 ZYRVIS</p>
</div>
</body>
</html>
