<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZYRVIS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(ellipse at 50% 40%, #fafafa 0%, #ebebeb 100%);
            overflow: hidden;
            position: relative;
        }

        /* 菜单按钮 */
        .menu-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 28px;
            height: 18px;
            cursor: pointer;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .menu-btn span {
            display: block;
            width: 28px;
            height: 3px;
            border-radius: 1.5px;
            background: rgba(255,255,255,0.5);
            backdrop-filter: blur(12px) saturate(1.3);
            -webkit-backdrop-filter: blur(12px) saturate(1.3);
            border: 0.5px solid rgba(255,255,255,0.7);
            box-shadow:
                0 1px 6px rgba(0,0,0,0.08),
                inset 0 0.5px 0.5px rgba(255,255,255,0.9);
            transform: scaleX(0);
            transform-origin: left;
            will-change: transform;
        }

        /* 菜单遮罩 */
        .menu-overlay {
            position: fixed;
            inset: 0;
            z-index: 998;
            pointer-events: none;
            opacity: 0;
            background: rgba(0,0,0,0.08);
            transition: opacity 0.35s ease;
        }

        .menu-overlay.active {
            pointer-events: auto;
            opacity: 1;
        }

        /* 菜单 — 液态玻璃浮动卡片 */
        .menu {
            position: fixed;
            top: 62px;
            left: 16px;
            width: 200px;
            border-radius: 16px;
            background: rgba(255,255,255,0.45);
            backdrop-filter: blur(24px) saturate(1.3);
            -webkit-backdrop-filter: blur(24px) saturate(1.3);
            border: 1px solid rgba(255,255,255,0.65);
            box-shadow:
                0 8px 32px rgba(0,0,0,0.08),
                0 2px 8px rgba(0,0,0,0.04),
                inset 0 1px 1px rgba(255,255,255,0.8);
            z-index: 999;
            padding: 8px 0;
            transform: scale(0.4);
            transform-origin: 12px -14px;
            opacity: 0;
            pointer-events: none;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                        opacity 0.25s ease;
        }

        .menu.active {
            transform: scale(1);
            opacity: 1;
            pointer-events: auto;
        }

        .menu ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .menu li {
            padding: 0 6px;
        }

        .menu li + li {
            border-top: 1px solid rgba(0,0,0,0.06);
        }

        .menu a {
            text-decoration: none;
            color: #222;
            font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', 'Microsoft YaHei', sans-serif;
            font-size: 15px;
            font-weight: 500;
            display: block;
            padding: 11px 14px;
            border-radius: 10px;
            transition: background 0.2s ease;
        }

        .menu a:hover {
            background: rgba(0,0,0,0.05);
        }

        .menu a:active {
            background: rgba(0,0,0,0.08);
        }

        /* 对话框 */
        .chat-container {
            margin-top: 30px;
            width: 300px;
            max-width: 90%;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 48px;
        }

        .chat-bubble {
            width: 100%;
            height: 48px;
            border-radius: 24px;
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.8);
            box-shadow:
                0 2px 16px rgba(0,0,0,0.06),
                inset 0 1px 2px rgba(255,255,255,0.9),
                inset 0 -1px 2px rgba(0,0,0,0.04);
            clip-path: inset(17px calc(50% - 7px) 17px calc(50% - 7px) round 24px);
            opacity: 0;
            will-change: clip-path, opacity;
            position: relative;
        }

        .chat-bubble .chat-input {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            padding: 0 18px;
            border: none;
            border-radius: 24px;
            font-size: 14px;
            font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', 'Microsoft YaHei', sans-serif;
            background: transparent;
            color: #111;
            text-align: center;
            opacity: 0;
            transform: translateY(6px);
            will-change: opacity, transform;
        }

        .chat-input::placeholder {
            color: rgba(0,0,0,0.3);
        }

        .chat-input:focus {
            outline: none;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            opacity: 0.025;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 200px;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stage {
            position: relative;
            width: 340px;
            height: 220px;
        }

        .stage svg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        #svg-logo {
            width: 300px;
            opacity: 0;
        }

        .typing-wrap {
            margin-top: 36px;
            min-height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
        }

        #typed {
            font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', 'Microsoft YaHei', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: #111;
            letter-spacing: 3px;
        }

        .cursor {
            display: inline-block;
            width: 2.5px;
            height: 24px;
            background: #111;
            margin-left: 2px;
            vertical-align: text-bottom;
            opacity: 0;
        }
        .cursor.on { animation: blink .7s step-end infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    </style>
</head>
<body>
<!-- 菜单按钮 -->
<div class="menu-btn" id="menuBtn">
    <span></span>
    <span></span>
    <span></span>
</div>

<!-- 菜单遮罩 -->
<div class="menu-overlay" id="menuOverlay"></div>

<!-- 菜单 -->
<div class="menu" id="menu">
    <ul>
        <li><a href="#">项目管理</a></li>
        <li><a href="#">ERUN</a></li>
    </ul>
</div>

<script>
(function () {
    // 菜单功能
    var menuBtn = document.getElementById('menuBtn');
    var menu = document.getElementById('menu');
    var menuOverlay = document.getElementById('menuOverlay');

    function toggleMenu() {
        menu.classList.toggle('active');
        menuOverlay.classList.toggle('active');
    }

    menuBtn.addEventListener('click', toggleMenu);
    menuOverlay.addEventListener('click', toggleMenu);

    var svgLogo = document.getElementById('svg-logo');
    var lHead   = document.getElementById('l-head');
    var lEyeL   = document.getElementById('l-eyeL');
    var lEyeR   = document.getElementById('l-eyeR');
    var lHlL    = document.getElementById('l-hlL');
    var lHlR    = document.getElementById('l-hlR');
    var lJaw    = document.getElementById('l-jaw');
    var typed   = document.getElementById('typed');
    var cursor  = document.getElementById('cursor');
    var typingWrap = document.querySelector('.typing-wrap');
    var chatBubble = document.getElementById('chatBubble');

    function wait(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

    /* ── 同步初始化 dasharray，防止页面渲染时路径闪烁 ── */
    function initDash(el) {
        var len = el.getTotalLength();
        el.style.strokeDasharray  = len;
        el.style.strokeDashoffset = len;
    }

    initDash(lHead);
    initDash(lEyeL);
    initDash(lEyeR);
    initDash(lJaw);

    /* ── 描线动画（标准 rAF，easeOutCubic） ── */
    function drawPath(el, dur, delay) {
        return new Promise(function(resolve) {
            setTimeout(function() {
                var len = parseFloat(el.style.strokeDasharray);
                var t0  = null;
                requestAnimationFrame(function tick(now) {
                    if (!t0) t0 = now;
                    var t = Math.min((now - t0) / dur, 1);
                    var e = 1 - Math.pow(1 - t, 3);
                    el.style.strokeDashoffset = (len * (1 - e)).toFixed(2);
                    if (t < 1) {
                        requestAnimationFrame(tick);
                    } else {
                        el.style.strokeDashoffset = '0';
                        resolve();
                    }
                });
            }, delay || 0);
        });
    }

    /* ── 填充过渡（先设透明再插值到目标色，解决 fill:none 无法过渡的问题） ── */
    function fillIn(el, color, dur) {
        var d = dur || 500;
        var c = color || '#111';
        el.style.fill = 'rgba(0,0,0,0)';
        el.getBoundingClientRect();               // 强制回流
        el.style.transition = 'fill ' + d + 'ms ease';
        el.style.fill = c;
    }

    /* ── 淡入 ── */
    function fadeIn(el, dur) {
        el.style.transition = 'opacity ' + (dur || 300) + 'ms ease';
        el.style.opacity = '1';
    }

    /* ── 通用 rAF 插值（easeOutCubic） ── */
    function animate(dur, onFrame) {
        return new Promise(function(resolve) {
            var t0 = null;
            requestAnimationFrame(function tick(now) {
                if (!t0) t0 = now;
                var t = Math.min((now - t0) / dur, 1);
                var e = 1 - Math.pow(1 - t, 3);
                onFrame(e);
                if (t < 1) requestAnimationFrame(tick);
                else resolve();
            });
        });
    }

    /* ═══════════════════════════════════════
       Phase 0 — 菜单按钮描线
       ═══════════════════════════════════════ */
    async function phaseMenu() {
        var spans = document.querySelectorAll('.menu-btn span');
        for (var i = 0; i < spans.length; i++) {
            await animate(350, (function(el) {
                return function(e) { el.style.transform = 'scaleX(' + e + ')'; };
            })(spans[i]));
            if (i < spans.length - 1) await wait(80);
        }
        /* 动画结束后恢复 transition 供菜单交互用 */
        for (var j = 0; j < spans.length; j++) {
            spans[j].style.willChange = 'auto';
            spans[j].style.transition = 'all 0.3s ease';
        }
    }

    /* ═══════════════════════════════════════
       Phase 1 — Logo 描线 → 填充
       ═══════════════════════════════════════ */
    async function phaseLogo() {
        /* 显示 Logo 容器（路径均已隐藏） */
        svgLogo.style.opacity = '1';

        /* 描线：头部 → 下颌 → 双眼 */
        await Promise.all([
            drawPath(lHead, 2200, 0),
            drawPath(lJaw,  1800, 600),
            drawPath(lEyeL, 800,  1600),
            drawPath(lEyeR, 800,  1800)
        ]);

        /* 填充各部件 */
        fillIn(lHead, '#111', 600);
        fillIn(lEyeL, '#111', 600);
        fillIn(lEyeR, '#111', 600);
        fillIn(lJaw,  '#111', 600);

        await wait(650);

        /* 去掉描边，避免 stroke 与 fill 叠加导致边缘模糊 */
        [lHead, lEyeL, lEyeR, lJaw].forEach(function(el) {
            el.style.transition = 'stroke-width 0.35s ease';
            el.style.strokeWidth = '0';
        });

        await wait(400);

        /* 眼睛高光淡入 */
        fadeIn(lHlL, 500);
        fadeIn(lHlR, 500);
        await wait(600);
    }

    /* ═══════════════════════════════════════
       Phase 2 — 打字效果
       ═══════════════════════════════════════ */
    async function phaseType() {
        var text = '你好，我是ZYRVIS';

        /* 打字区域淡入 */
        typingWrap.style.transition = 'opacity 0.4s ease';
        typingWrap.style.opacity = '1';
        await wait(350);

        cursor.classList.add('on');

        for (var i = 0; i < text.length; i++) {
            typed.textContent += text[i];
            var ch = text[i];
            await wait(ch === '，' ? 280 : /[A-Z]/.test(ch) ? 85 : 130);
        }

        /* 打字结束，光标淡出 */
        cursor.classList.remove('on');
        cursor.style.transition = 'opacity 0.4s ease';
        cursor.style.opacity = '0';
    }

    /* ═══════════════════════════════════════
       Phase 3 — 液态玻璃对话框（clip-path，纯 GPU 合成）
       ═══════════════════════════════════════ */
    async function phaseChatBubble() {
        await wait(300);

        /* 圆点淡入 */
        chatBubble.style.transition = 'opacity 0.3s ease';
        chatBubble.style.opacity = '1';
        await wait(400);

        /* 圆点向两侧拉伸为圆角矩形 */
        var startTop = 17, startSide = 50 - (7 / 3);   // % 近似
        await animate(600, function(e) {
            var top  = startTop * (1 - e);
            var side = startSide * (1 - e);
            chatBubble.style.clipPath =
                'inset(' + top + 'px ' + side + '% ' + top + 'px ' + side + '% round 24px)';
        });
        chatBubble.style.clipPath = 'inset(0 0 0 0 round 24px)';
        chatBubble.style.willChange = 'auto';

        /* 输入框浮现 */
        var input = document.getElementById('chatInput');
        input.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
        input.style.opacity = '1';
        input.style.transform = 'translateY(0)';
    }

    /* ═══════════════════════════════════════
       待机 — 随机眨眼
       ═══════════════════════════════════════ */
    function startBlinking() {
        var eyes = [lEyeL, lEyeR, lHlL, lHlR];
        eyes.forEach(function(el) {
            el.style.transformBox = 'fill-box';
            el.style.transformOrigin = 'center center';
        });

        function singleBlink() {
            return new Promise(function(resolve) {
                eyes.forEach(function(el) {
                    el.style.transition = 'transform 0.08s ease-in';
                    el.style.transform = 'scaleY(0.05)';
                });
                setTimeout(function() {
                    eyes.forEach(function(el) {
                        el.style.transition = 'transform 0.14s ease-out';
                        el.style.transform = 'scaleY(1)';
                    });
                    setTimeout(resolve, 150);
                }, 100);
            });
        }

        (async function blinkLoop() {
            while (true) {
                await wait(2500 + Math.random() * 4000);
                await singleBlink();
                /* 30% 概率连眨两次 */
                if (Math.random() < 0.3) {
                    await wait(180);
                    await singleBlink();
                }
            }
        })();
    }

    /* ═══ 启动 ═══ */
    (async function() {
        await wait(400);
        phaseMenu();           // 菜单按钮与 Logo 同步开始
        await phaseLogo();
        await phaseType();
        await phaseChatBubble();
        startBlinking();       // 进入待机眨眼
    })();
})();
</script>
</body>
